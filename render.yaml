# Render Blueprint — https://render.com/docs/blueprint-spec
# Déployer : Render Dashboard → New + → Blueprint → sélectionner ce repo.
#
# Le free tier dort après 15 min d'inactivité (premier appel ~30s).
# Les disques persistants ne sont dispos qu'à partir du plan Standard ;
# en free tier, logs.json/output/ disparaissent au redémarrage du service.

services:
  - type: web
    name: fingec-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: BACKEND_DATA_DIR
        value: /opt/render/project/src/backend
      - key: FRONTEND_ORIGINS
        sync: false   # à renseigner dans le dashboard une fois Vercel déployé
      - key: AUTH_SECRET
        generateValue: true   # secret de signature JWT (généré par Render)
      - key: ADMIN_EMAIL
        sync: false   # admin initial (créé au 1er démarrage, base vide)
      - key: ADMIN_PASSWORD
        sync: false
      - key: N8N_BASE_URL
        sync: false   # URL du service n8n (laisser vide si non utilisé)
