# nginx — sert le frontend statique + reverse-proxy de l'API sur le MÊME sous-domaine.
# Frontend et API partagent l'origine → aucun CORS, fetch relatifs.
#
# Installation :
#   sudo cp deploy/nginx-fingec.conf /etc/nginx/sites-available/fingec.conf
#   sudo ln -s /etc/nginx/sites-available/fingec.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d fingec.example.com   # génère/active le HTTPS
#
# Remplacer fingec.example.com par ton vrai sous-domaine.

server {
    listen 80;
    listen [::]:80;
    server_name fingec.example.com;

    # Doit être >= MAX_UPLOAD_BYTES côté backend (50 Mo).
    client_max_body_size 50M;

    root /opt/fingec/frontend/dist;
    index index.html;

    # ── API : proxifiée vers uvicorn (local) ─────────────────────────
    location ~ ^/(process|download|logs) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Frontend SPA : fallback sur index.html ───────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
