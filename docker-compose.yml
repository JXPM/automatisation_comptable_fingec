# Stack fingec — se greffe sur le réseau Docker partagé (pharmaclick_web) pour
# que le Caddy existant puisse joindre fingec-backend / fingec-frontend par leur nom.
# Aucun port publié : seul Caddy expose 80/443.
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: fingec-backend:latest
    container_name: fingec-backend
    restart: unless-stopped
    environment:
      BACKEND_DATA_DIR: /data
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-}
      # URL publique de l'app — sert à construire les liens cliquables des e-mails
      # de compte (invitation / réinitialisation). Sans elle : lien cassé (localhost).
      APP_BASE_URL: ${APP_BASE_URL:-https://app.fingec.fr}
      # Secret de signature des jetons de session (obligatoire en prod).
      AUTH_SECRET: ${AUTH_SECRET:-}
      # Cookie de session httpOnly + politique mots de passe + anti-bruteforce.
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-1}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      PASSWORD_MIN_CLASSES: ${PASSWORD_MIN_CLASSES:-3}
      PWNED_CHECK_ENABLED: ${PWNED_CHECK_ENABLED:-1}
      RATELIMIT_ENABLED: ${RATELIMIT_ENABLED:-1}
      # Suivi des erreurs / événements sécurité (Sentry). Vide = désactivé.
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENV: ${SENTRY_ENV:-production}
      # Amorçage du 1er admin au tout premier démarrage (base vide).
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # URL interne du service n8n (résolu par le DNS Docker via le nom du conteneur).
      N8N_BASE_URL: ${N8N_BASE_URL:-http://fingec-n8n:5678}
      # Conservation RGPD : purge auto des exports / journaux (0 = désactivé).
      OUTPUT_RETENTION_DAYS: ${OUTPUT_RETENTION_DAYS:-90}
      LOGS_RETENTION_DAYS: ${LOGS_RETENTION_DAYS:-365}
    depends_on:
      - n8n
    volumes:
      - fingec-data:/data
    expose:
      - "8000"
    networks:
      - web

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENV: ${SENTRY_ENV:-production}
    image: fingec-frontend:latest
    container_name: fingec-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - web

  # n8n — moteur d'automatisation (relances, e-mails, historique).
  # Reste INTERNE : aucun port publié. Deux accès via Caddy :
  #   - app.fingec.fr/n8n/webhook/* → relayé par le backend APRÈS contrôle du JWT
  #   - n8n.fingec.fr               → éditeur, protégé par le compte propriétaire n8n
  #     (les /webhook* y sont bloqués par Caddy pour ne pas contourner l'auth du dashboard).
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: fingec-n8n
    restart: unless-stopped
    environment:
      # Éditeur servi sur son sous-domaine dédié.
      N8N_HOST: ${N8N_HOST:-n8n.fingec.fr}
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: https://${N8N_HOST:-n8n.fingec.fr}/
      # URL publique des webhooks de PRODUCTION : ils transitent par le dashboard
      # authentifié (app.fingec.fr/n8n/...), pas par le sous-domaine éditeur.
      WEBHOOK_URL: ${WEBHOOK_URL:-https://app.fingec.fr/n8n/}
      # Derrière le reverse-proxy Caddy (1 saut).
      N8N_PROXY_HOPS: "1"
      GENERIC_TIMEZONE: Europe/Paris
      TZ: Europe/Paris
      # Clé de chiffrement des credentials (DOIT être fixée pour survivre aux redéploiements).
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-}
    volumes:
      - fingec-n8n-data:/home/node/.n8n
    expose:
      - "5678"
    networks:
      - web

# Réseau partagé avec pharmaclick (déjà créé par son compose).
networks:
  web:
    external: true
    name: pharmaclick_web

volumes:
  fingec-data:
  fingec-n8n-data:
